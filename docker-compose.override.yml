# Dev overrides — automatically applied by `docker compose up`
# Bind-mounts source for hot reload; exposes Redis and Postgres for debugging.
# NOTE: ./ATAL_Project/backend:/app mounts the full backend, so models/ and
# data/ inside it are automatically available at /app/models/ and /app/data/.

services:

  postgres-db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  django-backend:
    volumes:
      - ./ATAL_Project/backend:/app:cached
      - chroma-data:/chroma_data
    environment:
      BGE_M3_MODEL_PATH: /app/models/bge-m3
      BGE_RERANKER_MODEL_PATH: /app/models/bge-reranker-v2-m3
      CORPUS_DIR: /app/data/corpus
    command: >
      uvicorn backend.asgi:application
      --host 0.0.0.0
      --port 8000
      --reload

  celery-worker:
    volumes:
      - ./ATAL_Project/backend:/app:cached
      - chroma-data:/chroma_data
    environment:
      BGE_M3_MODEL_PATH: /app/models/bge-m3
      BGE_RERANKER_MODEL_PATH: /app/models/bge-reranker-v2-m3
      CORPUS_DIR: /app/data/corpus
    command: >
      celery -A backend worker
      --loglevel=debug
      --concurrency=2
      --queues=default,telemetry,ml_inference,rag,alerts

  celery-beat:
    volumes:
      - ./ATAL_Project/backend:/app:cached
