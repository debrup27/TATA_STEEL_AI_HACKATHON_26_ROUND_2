name: atal

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  chroma-data:
  redis-data:
  staticfiles:
  model-artifacts:
  # Reuses the atal_ollama_data volume populated by ollama_qwen.py standalone pull.
  # Declare as external so compose doesn't create a new empty volume.
  ollama-data:
    external: true
    name: atal_ollama_data

# Shared env block for all Django/Celery containers.
# Defaults baked in — no .env required.
# If .env exists in project root, any variable defined there overrides the default.
x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-backend.settings.dev}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-atal-hackathon-dev-secret-key-2026}
  DEBUG: ${DEBUG:-True}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,django-backend}
  POSTGRES_DB: ${POSTGRES_DB:-atal_db}
  POSTGRES_USER: ${POSTGRES_USER:-atal_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atal_pg_password}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-/chroma_data}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
  OLLAMA_SMALL_MODEL: ${OLLAMA_SMALL_MODEL:-qwen3.5:0.8b}
  OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
  EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cuda}
  RAG_USE_RERANKER: ${RAG_USE_RERANKER:-0}
  INGEST_CORPUS_ON_START: ${INGEST_CORPUS_ON_START:-0}
  BGE_M3_MODEL_PATH: ${BGE_M3_MODEL_PATH:-/models/bge-m3}
  BGE_RERANKER_MODEL_PATH: ${BGE_RERANKER_MODEL_PATH:-/models/bge-reranker-v2-m3}
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-atal-hackathon-jwt-key-2026}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  MODEL_ARTIFACT_ROOT: ${MODEL_ARTIFACT_ROOT:-/model-artifacts}
  ATAL_TRAIN_MODE: ${ATAL_TRAIN_MODE:-fast}
  SKIP_OLLAMA_WAIT: ${SKIP_OLLAMA_WAIT:-0}
  CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}

# ── RAM budget (32 GB host) ──────────────────────────────────────────────────
# ollama:          VRAM-resident (qwen3.5:9b Q4 ≈6GB + 0.8b ≈0.8GB + BGE≈1.7GB = ~8.5GB VRAM)
#                  System RAM usage by ollama process: ~1 GB
# django-backend:  BGE-M3 loaded once ≈1.7GB + app overhead ≈600MB  → 4 GB limit
# celery-worker:   BGE-M3 + reranker loaded once ≈3.5GB + worker overhead → 8 GB limit
# postgres-db:     shared_buffers default + WAL → 3 GB limit
# redis:           maxmemory 512mb (set in command) → 768 MB limit
# nginx + ui:      minimal → 1 GB combined
# Total: ~18 GB committed headroom, leaves 14 GB free on 32 GB host.
x-mem-django: &mem-django
  mem_limit: 4g
  mem_reservation: 1g

x-mem-celery: &mem-celery
  mem_limit: 8g
  mem_reservation: 2g

services:

  postgres-db:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    mem_limit: 3g
    mem_reservation: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atal_db}
      POSTGRES_USER: ${POSTGRES_USER:-atal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atal_pg_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atal_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8.0-alpine
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 128m
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama — always-on GPU service.
  # VRAM budget: qwen3.5:9b Q4≈6GB + qwen3.5:0.8b≈0.8GB + BGE-M3≈1.7GB = ~8.5GB (within 16GB)
  # keep_alive=-1 keeps both models resident indefinitely after first inference call.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-warmup:
    image: curlimages/curl:8.11.1
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      OLLAMA_SMALL_MODEL: ${OLLAMA_SMALL_MODEL:-qwen3.5:0.8b}
    volumes:
      - ./ATAL_Project/backend/scripts/ollama-warmup.sh:/warmup.sh:ro
    entrypoint: ["/bin/sh", "/warmup.sh"]
    networks:
      - backend-net
    depends_on:
      ollama:
        condition: service_healthy

  django-backend:
    build:
      context: ./ATAL_Project/backend
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    <<: *mem-django
    gpus: all
    environment:
      <<: *django-env
      BGE_M3_MODEL_PATH: /app/models/bge-m3
      BGE_RERANKER_MODEL_PATH: /app/models/bge-reranker-v2-m3
      CORPUS_DIR: /app/data/corpus
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./ATAL_Project/backend:/app:cached
      - staticfiles:/app/staticfiles
      - chroma-data:/chroma_data
      - model-artifacts:/model-artifacts
      - ./ATAL_Project/backend/models/bge-m3:/models/bge-m3:ro
      - ./ATAL_Project/backend/models/bge-reranker-v2-m3:/models/bge-reranker-v2-m3:ro
      - ./ATAL_Project/backend/data/corpus:/app/data/corpus:ro
    command: >
      uvicorn backend.asgi:application
      --host 0.0.0.0
      --port 8000
      --reload
    ports:
      - "8000:8000"
    networks:
      - frontend-net
      - backend-net
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-warmup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  celery-worker:
    build:
      context: ./ATAL_Project/backend
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    <<: *mem-celery
    gpus: all
    environment:
      <<: *django-env
      CELERY_LIGHT_ENTRYPOINT: "1"
      BGE_M3_MODEL_PATH: /app/models/bge-m3
      BGE_RERANKER_MODEL_PATH: /app/models/bge-reranker-v2-m3
      CORPUS_DIR: /app/data/corpus
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./ATAL_Project/backend:/app:cached
      - chroma-data:/chroma_data
      - model-artifacts:/model-artifacts
      - ./ATAL_Project/backend/models/bge-m3:/models/bge-m3:ro
      - ./ATAL_Project/backend/models/bge-reranker-v2-m3:/models/bge-reranker-v2-m3:ro
      - ./ATAL_Project/backend/data/corpus:/app/data/corpus:ro
    command: >
      sh -c "chown -R appuser:appuser /model-artifacts /chroma_data 2>/dev/null || true &&
      exec gosu appuser celery -A backend worker
      --loglevel=info
      --pool=threads
      --concurrency=${CELERY_CONCURRENCY:-2}
      --queues=default,telemetry,ml_inference,rag,alerts"
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      django-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 celery -A backend inspect ping || true"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 120s

  celery-beat:
    build:
      context: ./ATAL_Project/backend
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    environment:
      <<: *django-env
      CELERY_LIGHT_ENTRYPOINT: "1"
      BGE_M3_MODEL_PATH: /app/models/bge-m3
      BGE_RERANKER_MODEL_PATH: /app/models/bge-reranker-v2-m3
      CORPUS_DIR: /app/data/corpus
    volumes:
      - ./ATAL_Project/backend:/app:cached
      - model-artifacts:/model-artifacts
    command: >
      sh -c "chown -R appuser:appuser /model-artifacts 2>/dev/null || true &&
      exec gosu appuser celery -A backend beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      django-backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles:/app/staticfiles:ro
    networks:
      - frontend-net
    depends_on:
      django-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  ui-console:
    build:
      context: ./ATAL_Project/frontend
      dockerfile: docker/Dockerfile.dev
    restart: unless-stopped
    mem_limit: 4g
    mem_reservation: 512m
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_INTERNAL_URL: http://django-backend:8000
    volumes:
      - ./ATAL_Project/frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - frontend-net
    depends_on:
      django-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 300s

  postgres-test:
    image: timescale/timescaledb:latest-pg17
    profiles: ["test"]
    environment:
      POSTGRES_DB: atal_test
      POSTGRES_USER: atal_user
      POSTGRES_PASSWORD: test_password
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atal_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:8.0-alpine
    profiles: ["test"]
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-runner:
    build:
      context: ./ATAL_Project/backend
      dockerfile: docker/Dockerfile
    profiles: ["test"]
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings.dev
      DJANGO_SECRET_KEY: ci-test-secret
      POSTGRES_HOST: postgres-test
      POSTGRES_DB: atal_test
      POSTGRES_USER: atal_user
      POSTGRES_PASSWORD: test_password
      REDIS_URL: redis://redis-test:6379/0
      CELERY_BROKER_URL: redis://redis-test:6379/0
      CELERY_RESULT_BACKEND: redis://redis-test:6379/1
      CHROMA_PERSIST_DIR: /tmp/chroma_test
      OLLAMA_MOCK: "1"
      EMBEDDING_MOCK: "1"
      SKIP_OLLAMA_WAIT: "1"
      ATAL_ENTRYPOINT_LITE: "1"
      BGE_M3_MODEL_PATH: BAAI/bge-m3
      BGE_RERANKER_MODEL_PATH: BAAI/bge-reranker-v2-m3
    command: >
      sh -c "
        python manage.py ensure_migrations &&
        pytest apps/agents/tests/test_preference_profile.py -v
      "
    networks:
      - backend-net
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy

  # Aggregator — `docker compose up atal` starts the full stack
  atal:
    image: alpine:latest
    container_name: atal
    command:
      - sh
      - -c
      - |
        echo ""
        echo "╔══════════════════════════════════════════════════════════════════╗"
        echo "║  ATAL stack running                                              ║"
        echo "╠══════════════════════════════════════════════════════════════════╣"
        echo "║  Backend smoke tests  →  docker compose logs django-backend      ║"
        echo "║  Frontend Jest + lint →  docker compose logs ui-console            ║"
        echo "╠══════════════════════════════════════════════════════════════════╣"
        echo "║  API:      http://localhost:8000/health/ready/                   ║"
        echo "║  Frontend: http://localhost:3000                                 ║"
        echo "║  Proxy:    http://localhost/                                     ║"
        echo "╚══════════════════════════════════════════════════════════════════╝"
        echo ""
        tail -f /dev/null
    restart: unless-stopped
    networks:
      - frontend-net
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      django-backend:
        condition: service_healthy
      ui-console:
        condition: service_started
      celery-worker:
        condition: service_healthy
      celery-beat:
        condition: service_started
      nginx:
        condition: service_healthy
