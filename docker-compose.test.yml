# Test stack — used by CI: `docker compose -f docker-compose.test.yml up --abort-on-container-exit`

networks:
  test-net:
    driver: bridge

services:

  postgres-db:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_DB: atal_test
      POSTGRES_USER: atal_user
      POSTGRES_PASSWORD: test_password
    networks:
      - test-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atal_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:8.0-alpine
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-runner:
    build:
      context: ./ATAL_Project/backend
      dockerfile: docker/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings.dev
      POSTGRES_HOST: postgres-db
      POSTGRES_DB: atal_test
      POSTGRES_USER: atal_user
      POSTGRES_PASSWORD: test_password
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHROMA_PERSIST_DIR: /tmp/chroma_test
      SKIP_VLLM_WAIT: "1"
      VLLM_BASE_URL: http://localhost:9999
      BGE_M3_MODEL_PATH: BAAI/bge-m3
      BGE_RERANKER_MODEL_PATH: BAAI/bge-reranker-v2-m3
      DJANGO_SECRET_KEY: ci-test-secret
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        pytest apps/ --cov=apps --cov-report=term-missing -v
      "
    networks:
      - test-net
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
