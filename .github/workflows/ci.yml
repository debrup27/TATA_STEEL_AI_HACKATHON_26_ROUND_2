name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.11.13

      - name: Ruff check
        run: ruff check ATAL_Project/backend/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ATAL_Project/frontend/package-lock.json

      - name: ESLint
        working-directory: ATAL_Project/frontend
        run: |
          npm ci
          npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_DB: atal_test
          POSTGRES_USER: atal_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U atal_user"
          --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:8.0-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: ATAL_Project/backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: ATAL_Project/backend
        env:
          DJANGO_SETTINGS_MODULE: backend.settings.dev
          POSTGRES_HOST: localhost
          POSTGRES_DB: atal_test
          POSTGRES_USER: atal_user
          POSTGRES_PASSWORD: test_password
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          SKIP_VLLM_WAIT: "1"
          CHROMA_PERSIST_DIR: /tmp/chroma_ci
          BGE_M3_MODEL_PATH: BAAI/bge-m3
          BGE_RERANKER_MODEL_PATH: BAAI/bge-reranker-v2-m3
          DJANGO_SECRET_KEY: ci-test-secret
        run: |
          python manage.py migrate --noinput
          pytest apps/ --cov=apps --cov-report=xml -q

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          cat > .env << 'EOF'
          DJANGO_SECRET_KEY=ci-integration-secret
          POSTGRES_DB=atal_test
          POSTGRES_USER=atal_user
          POSTGRES_PASSWORD=test_password
          SKIP_VLLM_WAIT=1
          BGE_M3_MODEL_PATH=BAAI/bge-m3
          BGE_RERANKER_MODEL_PATH=BAAI/bge-reranker-v2-m3
          EOF

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from test-runner
        timeout-minutes: 15

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs
